<!DOCTYPE html>
<html>
<head>
    <title>EMS - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center vh-100">
    <div class="container card p-4" style="max-width: 400px;">
        <h3 class="text-center text-primary mb-4">Event Manager</h3>
        <input type="email" id="email" class="form-control mb-2" placeholder="Email">
        <input type="password" id="pass" class="form-control mb-2" placeholder="Password">
        <select id="role" class="form-select mb-3">
            <option value="participant">Join as Participant</option>
            <option value="organizer">Join as Organizer</option>
        </select>
        <button id="btnLogin" class="btn btn-primary w-100 mb-2">Login</button>
        <button id="btnReg" class="btn btn-outline-secondary w-100">Register</button>
    </div>

    <!-- Firebase Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCbQklWo-Sei43hBDraYtJkWJsQwQpaOQc",
            authDomain: "test1234-3d90f.firebaseapp.com",
            projectId: "test1234-3d90f",
            storageBucket: "test1234-3d90f.firebasestorage.app",
            messagingSenderId: "408863377899",
            appId: "1:408863377899:web:15abd18c203138dac8b1ae"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Register Logic
        document.getElementById('btnReg').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const role = document.getElementById('role').value;
            try {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await setDoc(doc(db, "users", res.user.uid), { email, role });
                alert("Account Created!");
            } catch (e) { alert(e.message); }
        };

        // Login Logic
        document.getElementById('btnLogin').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try {
                const res = await signInWithEmailAndPassword(auth, email, pass);
                const userDoc = await getDoc(doc(db, "users", res.user.uid));
                localStorage.setItem('userRole', userDoc.data().role);
                window.location.href = "dashboard.html";
            } catch (e) { alert("Invalid Login"); }
        };
    </script>
</body>
</html>
